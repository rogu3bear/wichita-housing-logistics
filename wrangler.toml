name = "wichita-housing-logistics"
main = "build/index.js"
compatibility_date = "2026-04-18"

# Demo lives on workers.dev only — no custom domain. groover.jkca.me was
# intentionally disconnected when the project was archived.
workers_dev = true

[build]
command = "bash ./scripts/build-edge.sh"

[assets]
directory = "./target/site"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "wichita-housing-logistics-db"
database_id = "29c3ccfd-b580-4079-8a98-94c94c223c0a"
preview_database_id = "29c3ccfd-b580-4079-8a98-94c94c223c0a"
migrations_dir = "migrations"
